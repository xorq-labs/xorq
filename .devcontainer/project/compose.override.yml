services:
  app:
    build:
      args:
        # Prepended to PATH inside the container (e.g. project venv bin dir)
        EXTRA_PATH: "${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/.venv/bin"
    volumes:
      # cached build/dependency volumes
      - uv-cache:/home/vscode/.cache/uv
      - venv:${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/.venv
      # persistent test data
      - ibis-testing-data:${DEV_CONTAINER_WORKSPACE:?DEV_CONTAINER_WORKSPACE is required}/ci/ibis-testing-data
    environment:
      # host services accessible via host.docker.internal
      - POSTGRES_HOST=host.docker.internal

volumes:
  # external:true (shared across worktrees, content-addressed) suppresses the
  # cross-worktree ownership warning; dev/devcontainer pre-creates them via
  # ensure_external_volumes() reading project/external-volumes.txt.
  uv-cache:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-uv-cache
    external: true
  # per-worktree: virtualenv paths are workspace-specific
  venv:
  # shared across worktrees (read-mostly test fixtures)
  ibis-testing-data:
    name: ${DEV_PROJECT_NAME:?DEV_PROJECT_NAME is required}-ibis-testing-data
    external: true
