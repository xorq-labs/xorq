exclude-labels:
  - ignore
  - release
  - dependencies
name-template: 'xorq unreleased'
version-template: unreleased

change-template: '- $TITLE (#$NUMBER)'

autolabeler:
  - label: 'release'
    title:
      - '/^release:/i'
  - label: 'dependencies'
    title:
      - '/^chore\(deps\):/i'
      - '/^fix\(deps\):/i'
  - label: 'perf'
    title:
      - '/^perf(\(.*\))?:/i'
  - label: 'feature'
    title:
      - '/^feat(\(.*\))?:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.*\))?:/i'
  - label: 'docs'
    title:
      - '/^docs(\(.*\))?:/i'
      - '/^chore\(docs\):/i'
  - label: 'ci'
    title:
      - '/^ci(\(.*\))?:/i'
      - '/^chore\(ci\):/i'
  - label: 'chore'
    title:
      - '/^chore(\(.*\))?:/i'
  - label: 'internal'
    title:
      - '/^ref(\(.*\))?:/i'
      - '/^refactor(\(.*\))?:/i'
      - '/^spike(\(.*\))?:/i'

categories:
  - title: 🚀 Performance improvements
    labels:
      - performance
      - perf
  - title: ✨ Enhancements
    labels:
      - feature
      - enhancement
  - title: 🐞 Bug fixes
    labels:
      - fix
      - bugfix
      - bug
  - title: 📖 Documentation
    labels:
      - documentation
      - docs
  - title: 📦 Build system
    labels:
      - build
      - ci
      - chore
  - title: 🛠️ Other improvements
    labels:
      - internal
      - maintenance

template: |
  ## Changes

  $CHANGES

  Thank you to all our contributors for making this release possible!
  $CONTRIBUTORS
