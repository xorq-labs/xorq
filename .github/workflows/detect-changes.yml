name: detect-changes

on:
  workflow_call:
    outputs:
      code:
        description: "true if any non-docs files changed (always true for push/dispatch)"
        value: ${{ jobs.changes.outputs.code }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name != 'pull_request' || steps.filter.outputs.code == 'true' }}
    steps:
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          # Require a changed file to match EVERY pattern in a filter. Without
          # this, dorny defaults to "some" (OR): the catch-all '**' matches
          # every file, so the '!docs/**' negations never exclude anything and
          # `code` is always true — triggering the full test suite on docs-only
          # PRs. With "every", a docs/*.qmd file matches '**' but fails the
          # negations, so it is correctly excluded.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.qmd'
              - '!codecov.yml'
              - '!.envrc'
