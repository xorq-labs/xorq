name: ci-release

on:
  workflow_dispatch:
  release:
    types: [ published ]

# we do not want more than one release workflow executing at the same time, ever
concurrency:
  group: release
  # cancelling in the middle of a release would create incomplete releases
  # so cancel-in-progress is false
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: release xorq to PyPI
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.1.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10.20"
      - name: install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true
      - name: publish package
        run: |
          uv build
          uv publish --trusted-publishing always