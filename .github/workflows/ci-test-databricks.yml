name: ci-test-databricks

on:
  workflow_dispatch:

permissions:
  contents: read


jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: ["x86_64"]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: extractions/setup-just@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: download test data
        run: just download-data

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --extra databricks --extra ibis --group dev --group test
        working-directory: ${{ github.workspace }}

      - name: pytest
        run: uv run --no-sync pytest --import-mode=importlib -m databricks -v --cov --cov-report=xml -s -vv
        working-directory: ${{ github.workspace }}
        env:
          DATABRICKS_SERVER_HOSTNAME: ${{ secrets.DATABRICKS_SERVER_HOSTNAME }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          IBIS_TESTING_DATABRICKS_CATALOG: ${{ vars.IBIS_TESTING_DATABRICKS_CATALOG }}

      - name: Upload coverage reports to Codecov
        if: success()
        continue-on-error: true
        uses: codecov/codecov-action@v5.5.4
        with:
          flags: databricks
          token: ${{ secrets.CODECOV_TOKEN }}
