name: ci-test-slow

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read


jobs:
  changes:
    uses: ./.github/workflows/detect-changes.yml
    permissions:
      contents: read
      pull-requests: read

  linux:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: bigger-runner
    strategy:
      matrix:
        include:
          - slow-level: 1
            python-version: "3.12"
          - slow-level: 2
            python-version: "3.12"
          - slow-level: 3
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: extractions/setup-just@v4.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: download test data
        run: just download-data

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --extra examples --extra postgres --extra pyiceberg --extra ibis --group dev --group test
        working-directory: ${{ github.workspace }}

      - name: start services
        if: matrix.slow-level != 3
        run: docker compose up postgres --build --wait

      - name: pytest
        run: uv run --no-sync -- pytest --verbose --import-mode=importlib --numprocesses auto --dist loadgroup --cov --cov-report=xml -m 'slow(level=${{ matrix.slow-level }})' --durations=70
        working-directory: ${{ github.workspace }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: ibis_testing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: slow
          fail_ci_if_error: false

