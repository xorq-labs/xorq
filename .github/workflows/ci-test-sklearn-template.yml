name: ci-test-sklearn-template

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    uses: ./.github/workflows/detect-changes.yml
    permissions:
      contents: read
      pull-requests: read

  sklearn-template:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: sklearn template end-to-end build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install xorq
        run: uv sync --locked --extra duckdb

      - name: Init sklearn template
        run: uv run xorq init --path sklearn_template --template sklearn

      - name: Patch template to use checked-out xorq
        run: |
          uv run python << 'EOF'
          import tomlkit, os
          from pathlib import Path

          workspace = os.environ["GITHUB_WORKSPACE"]
          p = Path("sklearn_template/pyproject.toml")
          doc = tomlkit.parse(p.read_text())

          tool = doc.setdefault("tool", tomlkit.table())
          uv_section = tool.setdefault("uv", tomlkit.table())
          sources = uv_section.setdefault("sources", tomlkit.table())

          xorq_source = tomlkit.inline_table()
          xorq_source.append("path", workspace)
          sources["xorq"] = xorq_source

          p.write_text(tomlkit.dumps(doc))
          EOF

      - name: Re-lock and export template requirements
        working-directory: sklearn_template
        run: |
          uv lock
          uv export \
            --locked \
            --no-dev \
            --no-emit-project \
            --no-header \
            --no-annotate \
            --all-extras \
            --python "<3.14,>=3.10" \
            > requirements.txt

      - name: Build sklearn template
        id: uv-build
        run: |
          build_path=$(uv run xorq uv build sklearn_template/expr.py | tail -1)
          echo "build_path=${build_path}" >> "$GITHUB_OUTPUT"
          echo "Build written to: ${build_path}"

      - name: Run sklearn template
        run: uv run xorq uv run "${{ steps.uv-build.outputs.build_path }}"
