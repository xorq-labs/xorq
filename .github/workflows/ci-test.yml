name: ci-test

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read


jobs:
  changes:
    uses: ./.github/workflows/detect-changes.yml
    permissions:
      contents: read
      pull-requests: read

  linux:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
        python-version: ["3.12"]
        backend:
          - name: datafusion
            services: false
            extras:
              - --extra datafusion
          - name: duckdb
            services: false
            extras:
              - --extra duckdb
          - name: xorq_datafusion
            services: false
            extras: []
          - name: xorq_datafusion
            python-version: "3.10"
            services: false
            extras: []
          - name: pyiceberg
            services: false
            extras:
              - --extra pyiceberg
          - name: postgres
            services: postgres
            extras:
              - --extra postgres
              - --extra examples
            sys-deps:
              - libpq5
          - name: pandas
            services: false
            extras: []
          - name: core
            services: postgres
            parallel: true
            extras:
              - --extra examples
              - --extra postgres
              - --extra pyiceberg
              - --extra sqlite
              - --extra ibis
          - name: sqlite
            services: false
            extras:
              - --extra sqlite
              - --extra duckdb
          - name: gizmosql
            services: false
            extras:
              - --extra gizmosql
              - --extra duckdb
          - name: trino
            services: trino
            extras:
              - --extra trino
              - --extra duckdb
    steps:
      - uses: actions/checkout@v6

      - name: configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@xorq.dev"

      - uses: extractions/setup-just@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: update and install system dependencies
        if: matrix.backend.sys-deps != null
        run: |
          set -euo pipefail

          sudo apt-get update -qq -y
          sudo apt-get install -qq -y build-essential ${{ join(matrix.backend.sys-deps, ' ') }}

      - name: download test data
        run: just download-data

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked ${{ join(matrix.backend.extras, ' ') }} --group dev --group test
        working-directory: ${{ github.workspace }}

      - name: Set up Docker Buildx
        if: ${{ matrix.backend.services }}
        uses: docker/setup-buildx-action@v4

      - name: Build postgres image with GHA layer cache
        if: ${{ contains(matrix.backend.services, 'postgres') }}
        uses: docker/bake-action@v7
        with:
          files: compose.yaml
          targets: postgres
          load: true
          set: |
            postgres.cache-from=type=gha,scope=docker-postgres
            postgres.cache-to=type=gha,scope=docker-postgres,mode=max

      - name: start services
        if: ${{ matrix.backend.services }}
        run: just up-ci ${{ matrix.backend.services }}

      - name: pytest
        timeout-minutes: 20
        run: >
          uv run --no-sync pytest
          --import-mode=importlib
          --cov --cov-report=xml
          -m ${{ matrix.backend.name }}
          --ignore=python/xorq/catalog
          -k 'not script_execution and not slow'
          -v --durations=20
          ${{ matrix.backend.parallel && '-n auto --dist=loadfile' || '' }}
        working-directory: ${{ github.workspace }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: ibis_testing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
