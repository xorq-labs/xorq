name: ci-docs-deploy

on:
  push:
    branches:
      - main
  merge_group:

# only a single docs job that pushes to `main` can run at any given time
concurrency: docs-${{ github.repository }}

permissions:
  # increase the rate limit for GitHub operations, but limit token permissions
  # to read-only
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: extractions/setup-just@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: cache ibis test data
        id: cache-test-data
        uses: actions/cache@v5
        with:
          path: ci/ibis-testing-data
          key: ibis-testing-data-${{ hashFiles('justfile') }}

      - name: download test data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        run: just download-data

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-extras --all-groups
        working-directory: ${{ github.workspace }}

      - name: cache quarto
        uses: actions/cache@v5
        with:
          path: ~/.local/share/quarto
          key: quarto-1.8.24

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.24

      - name: start services
        run: docker compose up postgres --wait --remove-orphans

      - name: build api docs
        run: just docs-apigen --verbose

      - name: build docs
        run: just docs-render
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: ibis_testing

      - name: check that all frozen computations were done before push
        run: git diff --exit-code --stat ':!uv.lock'

      - name: deploy docs
        run: just docs-deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
