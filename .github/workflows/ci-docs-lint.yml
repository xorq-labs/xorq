name: ci-docs-lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/ci-docs-lint.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.1.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true

      - name: Install Python doc dependencies
        # Include the project itself (not --only-group) so quartodoc can import
        # `xorq` to build the API reference; --no-default-groups skips dev. The
        # test group provides pytest for the CLI-contract step below.
        run: uv sync --no-default-groups --group docs --group test

      - name: CLI contract (docs reference real commands)
        # Sybil parses every `xorq ...` invocation from the docs' bash fences
        # and asserts each subcommand + flag resolves against the live click
        # tree. Catches renamed/removed/typo'd CLI references. See docs/conftest.py.
        run: uv run --no-sync pytest docs/ -q

      - name: Generate CLI reference
        # The CLI pages are generated from Click docstrings and gitignored;
        # generate before Vale so the docstring prose gets style-checked.
        run: uv run --no-sync python docs/generate_cli_reference.py

      - name: Generate llms.txt
        # Smoke check: fails when a quartodoc section references an item
        # that no longer imports. The .txt outputs are gitignored and
        # outside Vale's scope.
        run: uv run --no-sync python docs/generate_llms_txt.py

      - name: Vale (prose style)
        uses: vale-cli/vale-action@v2.1.2
        with:
          version: "3.14.2"
          files: "docs/"

      - uses: quarto-dev/quarto-actions/setup@v2.2.0
        with:
          version: 1.8.24

      - name: Lint docs
        run: uv run --no-sync bash docs/lint.sh
        env:
          CI: "true"
          SKIP_VALE: "1"
          SKIP_LYCHEE: "1"

      - name: Lychee (internal links)
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          # Exclude the quartodoc-generated reference tree: its pages carry
          # unresolved interlinks (raw .qmd targets, .html#member anchors for
          # upstream ibis objects), a quartodoc-config concern, not link rot.
          # Mirrors the --exclude-path in docs/lint.sh (docs/ prefix here since
          # the action runs from the repo root, lint.sh runs from docs/).
          args: --offline --include-fragments --no-progress --exclude-path docs/_site/reference docs/_site
          fail: true
