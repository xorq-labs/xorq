name: ci-docs-lint

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/ci-docs-lint.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python doc dependencies
        run: uv sync --only-group docs

      - name: Vale (prose style)
        uses: vale-cli/vale-action@v2
        with:
          version: "3.14.2"
          files: "docs/"

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.8.24

      - name: Lint docs
        run: uv run --no-sync bash docs/lint.sh
        env:
          CI: "true"
          SKIP_VALE: "1"
          SKIP_LYCHEE: "1"

      - name: Lychee (internal links)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --include-fragments --no-progress docs/_site
          fail: true
