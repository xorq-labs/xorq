StylesPath = docs/styles
MinAlertLevel = suggestion

# Treat .qmd (Quarto Markdown) as Markdown so vale uses its markup-aware
# parser — this skips fenced code blocks and inline code spans.
[formats]
qmd = md

# Apply these settings to all Markdown files
[*.qmd]
BasedOnStyles = Xorq, Google
# Suppress rules that produce excessive false positives in technical docs:
# - Parens: parentheticals like (default: value) are standard in API/CLI docs
# - Passive: passive constructions are appropriate in technical writing
# - Acronyms: domain-specific acronyms (UDXF, BSL, DAG) don't need per-file definitions
# - Semicolons: semicolons are fine in complex technical sentences
Google.Parens = NO
Google.Passive = NO
Google.Acronyms = NO
Google.Semicolons = NO

# Auto-generated API reference and ADRs are excluded from style checks.
[docs/reference/**]
BasedOnStyles =

[docs/adr/**]
BasedOnStyles =
