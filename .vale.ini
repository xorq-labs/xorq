StylesPath = docs/styles
MinAlertLevel = suggestion

# Treat .qmd (Quarto Markdown) as Markdown so vale uses its markup-aware
# parser — this skips fenced code blocks and inline code spans.
[formats]
qmd = md

# Apply these settings to all Markdown files
[*.qmd]
BasedOnStyles = Xorq, Google

# Auto-generated API reference and ADRs are excluded from style checks.
[docs/reference/**]
BasedOnStyles =

[docs/adr/**]
BasedOnStyles =
