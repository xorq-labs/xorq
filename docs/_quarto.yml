format:
  html:
    theme:
      dark:  ["darkly", "style/dark.scss"]
      light: ["flatly", "style/light.scss"]
    toc: true
    highlight-style:
      light: github
      dark: github-dark
    code-copy: false
    code-overflow: wrap
    code-annotations: hover
    mermaid:
      theme: dark
    execute:
      eval: false  # Don't execute code blocks by default
    include-in-header: 
      - "style/google.html"
      - "style/typography-spacing.html"

quartodoc:
  package: xorq.api
  title: Python API
  sidebar: reference/_sidebar.yml
  render_interlinks: true
  renderer: _renderer.py
  options:
    signature_name: short
  sections:
    - title: Core Operations
      desc: "APIs for reading and returning data"
      contents:
        - name: connect
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: execute
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: memtable
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: deferred_read_csv
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: deferred_read_parquet
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: to_csv
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: to_json
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: to_parquet
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: to_pyarrow
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: to_pyarrow_batches
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: to_sql
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: register
          dynamic: true
          signature_name: full
          package: xorq.api
        - name: get_plans
          dynamic: true
          signature_name: full
          package: xorq.api

    - title: Data Operations
