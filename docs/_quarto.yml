project:
  type: website
  render:
    - "**/*.qmd"
    - "**/*.md"
    - "!adr/**"
    - "!LINTING.md"
  # Generated by docs/generate_llms_txt.py (see `just docs-apigen`);
  # copied verbatim into the site root.
  resources:
    - llms.txt
    - llms-full.txt

execute:
  mermaid: true
  freeze: auto
  
website:
  site-url: https://docs.xorq.dev
  page-navigation: true
  title: "Xorq documentation"
  description: "Xorq documentation — build portable, multi-engine ML pipelines with deferred execution, caching, and lineage tracking. Tutorials, API reference, and guides."
  favicon: "style/favicon.ico"
  open-graph: true
  twitter-card: true

  page-footer:
    center: "This page is built with [Quarto](https://quarto.org/)."

  navbar:
    logo: "images/xorq-light-mode-logo.png"
    align: center
    title: false
    collapse-below: lg
    search: true

    right:
      - icon: github
        href: https://github.com/xorq-labs/xorq

    left:
      - href: getting_started/quickstart.qmd
        text: "Get started"
      - href: how_to/install_xorq.qmd
        text: "How-to"
      - href: tutorials/ml_tutorials/split_data_for_training.qmd
        text: "Tutorials"
      - href: concepts/understanding_xorq/why_deferred_execution.qmd
        text: "Concepts"
      - href: reference/index.qmd
        text: "Reference"
      - href: claude/index.qmd
        text: "Claude Code"

  sidebar:
    - id: claude-code
      title: "Claude Code"
      pinned: true
      contents:
        - href: claude/index.qmd
          text: "Plugin overview"

    - id: getting-started
      title: "Get started"
      collapse-level: 1
      pinned: true
      contents:
        - href: getting_started/quickstart.qmd
        - href: getting_started/understand_deferred_execution.qmd
        - href: getting_started/explore_caching.qmd
        - href: getting_started/switch_backends.qmd
        - href: getting_started/your_first_expression.qmd
          text: "Your first expression"

    - id: how-to
      title: "How-to guides"
      collapse-level: 1
      pinned: true
      contents:
        - href: how_to/install_xorq.qmd
        - href: how_to/connect_to_backends.qmd
        - href: how_to/cache_by_backend.qmd
        - href: how_to/switch_backends.qmd
        - href: how_to/compose_catalog_entries.qmd

    - id: tutorials
      title: "Tutorials"
      collapse-level: 2
      pinned: true
      contents:
        - id: core-tutorials-section
          section: "Core tutorials"
          contents:
            - href: tutorials/core_tutorials/get-started-with-xorq-init.qmd
            - href: tutorials/core_tutorials/your_first_build.qmd
            - href: tutorials/core_tutorials/build_a_semantic_catalog.qmd
            - href: tutorials/core_tutorials/working_with_the_catalog.qmd
        - id: ml-tutorials-section
          section: "ML tutorials"
          contents:
            - href: tutorials/ml_tutorials/split_data_for_training.qmd
            - href: tutorials/ml_tutorials/train_your_first_model.qmd
            - href: tutorials/ml_tutorials/explore_model_evaluation.qmd

    - id: concepts
      title: "Concepts"
      collapse-level: 2
      pinned: true
      contents:
        - id: fundamentals-section
          section: "Fundamentals"
          contents:
            - concepts/understanding_xorq/what_is_xorq.qmd
